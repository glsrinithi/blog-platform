<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Blog Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-blog"></i>
                <span>Blog Hub</span>
            </div>
            <div class="nav-controls">
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </nav>
    </header>

    <main class="main-container create-container">
        <div class="create-form-container">
            <div class="form-header">
                <h1><i class="fas fa-edit"></i> Create New Post</h1>
            </div>
            
            <form id="createPostForm" class="create-form">
                <div class="form-group">
                    <label for="postTitle">Title</label>
                    <input type="text" id="postTitle" required>
                </div>
                
                <div class="form-group">
                    <label for="postCategory">Category</label>
                    <select id="postCategory">
                        <option value="books">📚 Books</option>
                        <option value="daily-life">🌈 Daily Life</option>
                        <option value="technology">💻 Technology</option>
                        <option value="travel">✈️ Travel</option>
                        <option value="food">🍕 Food</option>
                        <option value="music">🎵 Music</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="postContent">Your Story</label>
                    <textarea id="postContent" rows="12" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-rocket"></i> Publish Post
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
